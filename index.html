<!DOCTYPE html> 
<html lang="ru"> 
<head> 
<meta charset="UTF-8"> 
<title>Туристические маршруты Кировска</title> 
<link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css"/> 
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css"/> 
<link rel="stylesheet" href="style.css"/> 
<link rel="stylesheet" href="https://unpkg.com/leaflet.markercluster/dist/MarkerCluster.css"/> 
<link rel="stylesheet" href="https://unpkg.com/leaflet.markercluster/dist/MarkerCluster.Default.css"/> 
</head> 
<body> 
<!-- Главная секция --> 
<section class="hero"> 
<div class="hero-overlay">
 <h1>Туристические маршруты Кировска</h1>
 <p>Все места Кировска на одной карте: от гор до ресторанов - выбирай и планируй!</p>
 <button class="main-btn" 
onclick="scrollToMap()">Спланировать маршрут</button>
 </div>
 </section> 
<!-- Категории -->
 <!-- Основной контент -->
<div id="planner-section"> <!-- добавили id -->
  <div class="categories">
    <button onclick="setCategory('all')">Все</button>
    <button onclick="setCategory('place')">Достопримечательности</button>
    <button onclick="setCategory('hotel')">Отели</button>
    <button onclick="setCategory('food')">Еда</button>
    <button onclick="setCategory('leisure')">Досуг</button>
    <button onclick="showFavorites()">❤️ Избранное</button>
    <input id="searchInput" placeholder="Поиск..." oninput="applyFilters()">
    <select id="ratingFilter" onchange="applyFilters()">
      <option value="0">Все</option>
      <option value="4">⭐ 4+</option>
      <option value="4.5">⭐ 4.5+</option>
    </select>
  </div>

<!-- Основной контент -->
  <div class="main" id="map-section">
    <div id="sidebar" class="sidebar"></div>
    <div id="map" class="map"></div>
  </div>
</div>

<!-- Панель маршрута --> <div class="route-panel">
 <button onclick="saveRoute()">💾 Сохранить маршрут</button>
 <button onclick="loadRoute()">📂 Показать сохраненный маршрут</button>
 <button onclick="exportRoutePDF()">📤 Скачать</button>
 </div> 
<!-- Предложенные маршруты --> 
<h2 class="routes-title">Готовые маршруты</h2>
 <div id="routes"></div>

 <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
 <script src="https://unpkg.com/leaflet.markercluster/dist/leaflet.markercluster.js"></script>
 <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
 <script src="https://cdnjs.cloudflare.com/ajax/libs/html2canvas/1.4.1/html2canvas.min.js"></script>
<script defer src="app.js"></script>

<!-- Модалка избранного -->
<div id="favoritesModal" class="modal">
  <div class="modal-content">
    <span class="close" onclick="closeFavorites()">×</span>
    <h2>Избранное</h2>
    <div id="favoritesList"></div>
  </div>
</div>
</body>
 </html>
